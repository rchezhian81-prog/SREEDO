# Production overlay for docker-compose.yml — adds TLS (Nginx :443) + certbot auto-renewal.
# Local development is UNAFFECTED — it uses docker-compose.yml on its own.
# For production (after DNS points here and .env is filled in):
#
#   ./infra/init-letsencrypt.sh       # one-time: obtain the certificate
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Certificates live under ./infra/certbot/ (git-ignored — NEVER commit private keys).

services:
  nginx:
    ports:
      - "443:443"
    volumes:
      # Swap the HTTP-only dev config for the TLS production config.
      # (Same target as docker-compose.yml's mount, so this one wins.)
      - ./infra/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      # Certificates: written by certbot, read by nginx.
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    # Reload every 6h so renewed certificates are picked up without downtime.
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    # Try to renew twice a day (Let's Encrypt's recommended cadence); the
    # certbot service reads renewal config that init-letsencrypt.sh creates.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

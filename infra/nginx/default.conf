# Reverse proxy: / -> Next.js frontend, /api -> Express backend.
# For production TLS, terminate with certbot/Let's Encrypt on the VPS
# (see README "Deployment") and add the 443 server block it generates.

# No static `upstream` blocks: nginx caches the resolved IP for the worker's life,
# so a `docker compose up --build` (new container IP) would 502 until nginx
# restarted. Resolve the service names per-request via Docker's embedded DNS
# instead, so nginx self-heals when a container is recreated.

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Swagger is disabled in the backend in production (ENABLE_API_DOCS=false).
    # If you enable it, also restrict it here — e.g. allow only your office IP:
    #   location /api/docs { allow 203.0.113.10; deny all; proxy_pass http://backend; }
    #   location = /api/docs.json { allow 203.0.113.10; deny all; proxy_pass http://backend; }

    location /api/ {
        set $api_upstream backend:4000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        set $probe_upstream backend:4000;
        proxy_pass http://$probe_upstream;
        proxy_set_header Host $host;
    }

    location / {
        set $web_upstream frontend:3000;
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

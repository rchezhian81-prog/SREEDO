# Reverse proxy: / -> Next.js frontend, /api -> Express backend.
# For production TLS, terminate with certbot/Let's Encrypt on the VPS
# (see README "Deployment") and add the 443 server block it generates.

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:4000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Swagger is disabled in the backend in production (ENABLE_API_DOCS=false).
    # If you enable it, also restrict it here — e.g. allow only your office IP:
    #   location /api/docs { allow 203.0.113.10; deny all; proxy_pass http://backend; }
    #   location = /api/docs.json { allow 203.0.113.10; deny all; proxy_pass http://backend; }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

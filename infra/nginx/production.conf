# Production Nginx with TLS for gocampusos.com.
# A concrete fill-in of production.conf.example (domain already substituted),
# so the go-live step in docs/DEPLOYMENT.md is pre-done. To use it:
#   1) sudo certbot certonly --standalone -d gocampusos.com -d www.gocampusos.com
#   2) in docker-compose.yml's nginx service, publish "443:443" and mount:
#        - ./infra/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
#        - /etc/letsencrypt:/etc/letsencrypt:ro
#   3) set CORS_ORIGIN=https://gocampusos.com and
#      NEXT_PUBLIC_API_URL=https://gocampusos.com/api/v1 in .env, then rebuild.

upstream frontend { server frontend:3000; }
upstream backend  { server backend:4000; }

# HTTP :80 — serve the ACME challenge, redirect everything else to the HTTPS apex.
server {
    listen 80;
    server_name gocampusos.com www.gocampusos.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://gocampusos.com$request_uri; }
}

# HTTPS :443 — redirect www → apex.
server {
    listen 443 ssl;
    http2 on;
    server_name www.gocampusos.com;

    ssl_certificate     /etc/letsencrypt/live/gocampusos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gocampusos.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://gocampusos.com$request_uri;
}

# HTTPS :443 — terminate TLS and reverse-proxy the app (apex).
server {
    listen 443 ssl;
    http2 on;
    server_name gocampusos.com;

    ssl_certificate     /etc/letsencrypt/live/gocampusos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gocampusos.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Must be >= STORAGE_MAX_MB (default 10) so uploads/backups aren't truncated.
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Security headers (HSTS only over HTTPS).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "0" always;

    # Swagger stays disabled in the backend in production (ENABLE_API_DOCS=false).
    # If you ever enable it, also restrict it here to trusted IPs:
    #   location /api/docs { allow 203.0.113.10; deny all; proxy_pass http://backend; }
    #   location = /api/docs.json { allow 203.0.113.10; deny all; proxy_pass http://backend; }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public health/readiness probes (no secrets, no auth).
    location ~ ^/(health|ready|live)$ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

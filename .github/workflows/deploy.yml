name: Deploy

# Continuous deployment to the production VPS.
#
# SAFETY: this workflow is OFF by default. The deploy job only runs when the repo
# owner opts in by setting the repository variable DEPLOY_ENABLED to "true" AND
# providing the VPS_* secrets below. Until then the job is skipped, so this file
# never breaks CI on main.
#
# To enable (GitHub → Settings → Secrets and variables → Actions):
#   Variables:  DEPLOY_ENABLED = true        (DEPLOY_PATH optional, default /opt/sreedo)
#   Secrets:    VPS_HOST, VPS_USER, VPS_SSH_KEY   (VPS_PORT optional, default 22)
#
# It performs the same steps you'd run by hand: pull the latest main and rebuild
# the stack with the production compose override (data volumes are preserved).

on:
  workflow_dispatch: {}
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/opt/sreedo' }}"
            echo "▶ Pulling latest main…"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            echo "▶ Rebuilding stack (production compose override; data volumes preserved)…"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
            $COMPOSE pull || true            # refresh image-based services (db, nginx…)
            $COMPOSE up -d --build
            echo "▶ Status:"
            $COMPOSE ps
            echo "✔ Deploy complete."

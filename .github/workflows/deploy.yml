name: Deploy

# Production deploy to the VPS — runs automatically on every push/merge to main,
# and can also be run manually (Actions → "Deploy" → "Run workflow").
#
# SAFETY: OFF by default. The job runs only when the repo variable DEPLOY_ENABLED is
# "true" AND the VPS_* secrets are set. Until then the job is skipped, so this file
# never affects CI. The deploy itself backs up the DB and auto-rolls back if the
# post-deploy health check fails (see scripts/deploy.sh).
#
# Enable (GitHub → Settings → Secrets and variables → Actions):
#   Variables:  DEPLOY_ENABLED = true        (DEPLOY_PATH optional, default /opt/sreedo)
#   Secrets:    VPS_HOST, VPS_USER, VPS_SSH_KEY   (VPS_PORT optional, default 22)
#
# All deploy logic — DB backup, server-local override preservation, fast-forward
# pull, selective rebuild, nginx validate + reload, health check, and auto-rollback
# — lives in scripts/deploy.sh, so a CI deploy and a hand-run deploy are identical.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy over SSH (runs scripts/deploy.sh on the VPS)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          command_timeout: "20m"
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/opt/sreedo' }}"
            bash scripts/deploy.sh

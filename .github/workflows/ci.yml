name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (typecheck, test, build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sreedo
          POSTGRES_PASSWORD: sreedo
          POSTGRES_DB: sreedo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sreedo -d sreedo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
        env:
          DATABASE_URL: postgres://sreedo:sreedo@localhost:5432/sreedo_test
          JWT_ACCESS_SECRET: ci-access-secret-not-dev
          JWT_REFRESH_SECRET: ci-refresh-secret-not-dev
      - run: npm run build

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  mobile:
    name: Mobile (analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t sreedo-backend ./backend
      - run: docker build -t sreedo-frontend ./frontend
